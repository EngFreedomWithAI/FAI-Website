# Cloudflare Pages config for Freedom with AI.
# Static site is built by Astro into ./dist; Pages Functions live in ./functions.
name = "fai-website"
compatibility_date = "2026-06-05"
pages_build_output_dir = "dist"

# D1 database binding. Create it once with:
#   npm run db:create
# then paste the returned database_id below (and bind DB in the Pages dashboard too,
# for Production and Preview).
[[d1_databases]]
binding = "DB"
database_name = "fai-website-db"
database_id = "397b2112-743f-46a7-8b24-b8c9b5c0c2b0"

# Plain env vars (wrangler.toml is the source of truth — dashboard only accepts secrets).
# NODE_VERSION is also pinned via .nvmrc for the Pages build image.
[vars]
NODE_VERSION = "20"
SITE = "https://freedomwith.ai"
SITE_URL = "https://freedomwith.ai"
AWS_REGION = "us-east-2"
SES_FROM = "hello@freedomwith.ai"
CONTACT_TO = "soniasarao@freedomwith.ai"

# Encrypted secrets only — set in Pages dashboard (Production + Preview), not in this file:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
